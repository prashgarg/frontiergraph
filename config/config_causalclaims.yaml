paths:
  external_dir: data/external
  demo_dir: data/demo
  processed_dir: data/processed
  outputs_dir: outputs

scoring:
  alpha: 0.5
  beta: 0.2
  gamma: 0.3
  delta: 0.2

filters:
  causal_only: false
  min_stability: null
  candidate_kind: directed_causal

features:
  tau: 3
  max_path_len: 2
  max_neighbors_per_mediator: 10
  top_k_mediators: 5
  top_k_paths: 5
  top_k_supporting_papers_per_edge: 3

backtest:
  horizons: [3, 5, 10, 15]
  k_values: [50, 100, 500, 1000]

llm:
  model: gpt-5-nano
  max_budget_usd: 20
  key_path: ../key/openai_api_key.txt
  openalex_key_path: ../key/openalex_api_key.txt
  pricing_per_million_tokens:
    input_usd: 0.20
    output_usd: 0.80
  output_to_input_token_ratio: 0.25
