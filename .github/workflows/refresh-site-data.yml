name: Refresh site data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Download beta database
        env:
          FRONTIERGRAPH_PUBLIC_DB_URL: ${{ secrets.FRONTIERGRAPH_PUBLIC_DB_URL }}
        run: |
          mkdir -p data/processed
          if [ -z "$FRONTIERGRAPH_PUBLIC_DB_URL" ]; then
            echo "FRONTIERGRAPH_PUBLIC_DB_URL secret is not configured."
            exit 1
          fi
          curl -fsSL "$FRONTIERGRAPH_PUBLIC_DB_URL" -o data/processed/app_causalclaims.db
      - name: Export site data
        env:
          PYTHONPATH: .
          FRONTIERGRAPH_PUBLIC_DB_URL: ${{ secrets.FRONTIERGRAPH_PUBLIC_DB_URL }}
        run: python scripts/export_site_data.py
      - name: Commit generated updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/src/generated site/public/data site/public/downloads
          git diff --cached --quiet || git commit -m "Refresh site data"
      - name: Push changes
        run: git push
